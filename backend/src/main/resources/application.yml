spring:
  application:
    name: stviz-backend
  datasource:
    url: jdbc:sqlite:stviz.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    url: jdbc:sqlite:stviz.db
    locations: classpath:db/migration

